<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relay Control Preview</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Raspberry Pi Touch UI</p>
          <h1>Relay Control</h1>
        </div>
        <button class="danger-button" id="allOffButton" type="button">ALL OFF</button>
      </header>

      <section class="relay-grid" aria-label="Relay controls">
        <button class="relay-tile" type="button" data-relay="Light" data-pin="17">
          <span class="relay-name">Light</span>
          <span class="relay-pin">GPIO 17</span>
          <span class="relay-state">OFF</span>
        </button>
        <button class="relay-tile" type="button" data-relay="Pump" data-pin="27">
          <span class="relay-name">Pump</span>
          <span class="relay-pin">GPIO 27</span>
          <span class="relay-state">OFF</span>
        </button>
        <button class="relay-tile" type="button" data-relay="Fan" data-pin="22">
          <span class="relay-name">Fan</span>
          <span class="relay-pin">GPIO 22</span>
          <span class="relay-state">OFF</span>
        </button>
        <button class="relay-tile" type="button" data-relay="Spare" data-pin="23">
          <span class="relay-name">Spare</span>
          <span class="relay-pin">GPIO 23</span>
          <span class="relay-state">OFF</span>
        </button>
      </section>

      <footer class="statusbar">
        <span id="statusText">DEMO mode ready</span>
        <span class="hint">Browser preview only</span>
      </footer>
    </main>

    <script src="script.js"></script>
  </body>
</html>
