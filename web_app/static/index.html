<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Relay Control</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Raspberry Pi Web Control</p>
          <h1>Relay Control</h1>
        </div>
        <div class="top-actions">
          <span class="mode-pill" id="modePill">Connecting</span>
          <button class="danger-button" id="allOffButton" type="button">ALL OFF</button>
        </div>
      </header>

      <section class="relay-grid" id="relayGrid" aria-label="Relay controls"></section>

      <footer class="statusbar">
        <span id="statusText">Loading relay state...</span>
        <span id="clockText"></span>
      </footer>
    </main>

    <template id="relayTemplate">
      <button class="relay-tile" type="button">
        <span class="relay-name"></span>
        <span class="relay-pin"></span>
        <span class="relay-state">OFF</span>
      </button>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
